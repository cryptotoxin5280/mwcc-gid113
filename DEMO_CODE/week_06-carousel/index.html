<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I ♥ Trains</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">    
    <!-- /BOOTSTRAP -->

    <!-- FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- /FONTAWESOME -->
</head>
<body> 
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">

            <!-- BRAND -->
            <a class="navbar-brand" href="#">
                <h2>I <font color='red'>♥</font> Trains</h2>
            </a>
            <!-- /BRAND -->

            <!-- NAVBAR LINKS -->
            <ul class="navbar-nav flex-row">
                <li class="nav-item me-3">
                    <a class="nav-link" href="#about">About</a>
                </li>
                <li class="nav-item me-3">
                    <a class="nav-link" href="#routes">Routes</a>
                </li>
                <li class="nav-item me-3">
                    <a class="nav-link" href="#contact">Contact</a>
                </li>
            </ul>
            <!-- /NAVBAR LINKS -->
        </div>
    </nav>
    <!-- /NAVBAR -->

    <!-- CAROUSEL -->
    <style>
    .carousel-item {
        height: 600px; /* Choose your preferred height */
    }

    .carousel-item img {
        /* height: 100%; */
        object-fit: cover;
        object-position: top;
    }
    </style>
    <div id="carouselControl" class="carousel slide" data-bs-ride="carousel">
        <ol class="carousel-indicators">
            <li data-bs-target="#carouselControl" data-bs-slide-to="0" class="active"></li>
            <li data-bs-target="#carouselControl" data-bs-slide-to="1"></li>
        </ol>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img class="d-block w-100" src="assets/union_station.jpg" alt="Denver Union Station">
            </div>
            <div class="carousel-item">
                <img class="d-block w-100" src="assets/engine_9.jpg" alt="Engine No. 9">
            </div>
            <!-- <div class="carousel-item">
                <img class="d-block w-100" src="..." alt="Third slide">
            </div> -->
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselControl" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselControl" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
    <!-- /CAROUSEL -->

    <!-- SECTIONS -->
    <div id="home" class="container mt-3">
        <h1><i class="fa-solid fa-house me-1"></i>Home Section</h1>
        <p>Welcome to this one-page website!</p>
    </div>

    <div id="about" class="container mt-5">
        <h1><i class="fa-solid fa-info me-1"></i>About</h1>
    </div>

    <div id="routes" class="container mt-5">
        <h1><i class="fa-solid fa-gear me-1"></i>Routes</h1>

    </div>

    <div id="contact" class="container mt-5">
        <h1><i class="fa-solid fa-envelope me-1"></i>Contact</h1>
    </div>
    <!-- /SECTIONS -->

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <!-- /BOOTSRAP-->
</body>
</html>
