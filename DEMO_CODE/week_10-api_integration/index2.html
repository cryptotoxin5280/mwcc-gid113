<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<p id="output"></p>
<form id="userForm">
    <label for="name" style="color: bisque;">Name:</label>
    <input type="text" id="name" required><br><br>
 
    <label for="favorite" style="color: bisque;">favorite dlc?</label>
    <input type="text" id="favorite" required><br><br>
 
    <button type="submit" style="color: bisque;">Submit</button>
</form>
 
<p id="output" style="color: bisque;" >BOO!</p>
 
<script>
$(document).ready(function() {
    $("#userForm").on("submit", function(event) {
        event.preventDefault();

        const name = $("#name").val();
        const favorite = $("#favorite").val();

        const message = "Hello " + name + "! Your favorite DLC is " + favorite + ".";

        $("#output").text(message);
    });
});
</script>
 
</body>
</html>
