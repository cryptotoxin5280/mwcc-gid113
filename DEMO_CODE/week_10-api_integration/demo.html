<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <div id="weather-container">
        <h2>Forecast for Gardner, MA</h2>
        <div id="forecast-output">Loading weather...</div>
    </div>

    <script>
        const lat = "42.5750";
        const lon = "-71.9981";

        fetch(`https://api.weather.gov/points/${lat},${lon}`)
            .then(response => response.json())
            .then(data => {
                const forecastUrl = data.properties.forecast;
                return fetch(forecastUrl);
            })
            .then(response => response.json())
            .then(data => {
                const today = data.properties.periods[0];
                const tonight = data.properties.periods[1];

                $('#forecast-output').html(`
                    <p>Forecast: ${today.shortForecast}</p>
                    <p>High: ${today.temperature}</p>
                    <p>Low: ${tonight.temperature}</p>
                `);
            })
        .catch(() => {
            $('#weather-container').html("<p>Error retrieving data.</p>");
        })
    </script>

</body>
</html>
