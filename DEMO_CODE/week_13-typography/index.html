<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h1>Typography</h1>
                    </div>
                    <div class="card-body">
                        <div class="demo-section">
                            <div class="label">Lead Paragraph</div>
                            <p class="lead mb-0">Lead paragraph.</p>
                        </div>

                        <div class="demo-section">
                            <div class="label">Inline Code</div>
                            <p class="mb-0"><code>Second paragraph...</code></p>
                        </div>

                        <div class="demo-section">
                            <div class="label">Highlight</div>
                            <p class="mb-0"><mark>Highlight</mark> this text...</p>
                        </div>

                        <div class="demo-section">
                            <div class="label">Preformatted Text</div>
                            <pre class="mb-0">This is a fixed-width font.</pre>
                        </div>

                        <div class="demo-section">
                            <div class="label">Custom Styling</div>
                            <p class="mb-0" style="font-family: 'Comic Sans MS'; letter-spacing: 1px;">This is a test!</p>
                        </div>

                        <div class="demo-section">
                            <div class="label">Blockquote</div>
                            <blockquote class="mb-0">"This is an example of a blockquote!"</blockquote>
                        </div>

                        <div class="demo-section">
                            <div class="label">Fugaz One</div>
                            <p class="fugaz-demo mb-0">Fugaz One</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
